version: '3.8'  # Docker Compose配置文件版本，兼容Docker 20.10+

services:
  # SQL Server 2019 数据库服务（兼容性好、资源占用低）
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: dbfm-sqlserver
    ports:
      - "1433:1433"  # 端口映射：宿主机1433 → 容器内1433，外部工具可以直接连接
    environment:
      - ACCEPT_EULA=Y  # 必须接受许可协议才能启动
      - SA_PASSWORD=Fkh6G2B4s73N@2024  # SA账号密码，要求至少8位，包含大小写字母+数字+特殊字符
      - MSSQL_PID=Developer  # 版本：Developer是免费开发版，功能和企业版完全一致，生产环境可以改成Enterprise
      - TZ=Asia/Shanghai  # 时区设置为北京时间
      - MSSQL_MEMORY_LIMIT_MB=2048  # 限制SQL Server最大使用2G内存，避免榨干服务器
    deploy:
      resources:
        limits:
          cpus: '2'  # 最多用2个CPU核心
          memory: 3G  # 最多用3G内存
        reservations:
          cpus: '1'  # 至少保证1个核心
          memory: 1G  # 至少保证1G内存
    volumes:
      # 数据库数据持久化：把容器内的数据库文件挂载到宿主机，容器删除数据不会丢失
      - sqlserver_data:/var/opt/mssql
      # 同步宿主机时区
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped  # 自动重启

  # 后端API服务（.NET 10 + ABP框架）
  backend:
    build:
      context: ./aspnet-core  # 构建上下文目录：后端源码根目录
      dockerfile: Dockerfile  # 后端Docker镜像构建文件路径
    container_name: dbfm-backend  # 容器名称，方便运维管理
    ports:
      - "8090:8090"  # 端口映射：宿主机8090端口 → 容器内8090端口（后端服务监听端口）
    environment:
      # .NET运行环境：Production生产环境 / Development开发环境
      - ASPNETCORE_ENVIRONMENT=Production
      # 数据库连接字符串：直接用docker内部服务名sqlserver访问数据库，不需要填IP
      - ConnectionStrings__Default=Server=sqlserver,1433;Database=DbFieldManager;User Id=sa;Password=Fkh6G2B4s73N@2024;Encrypt=Optional;TrustServerCertificate=true;
      # 后端服务自身访问地址，用于生成链接和跨域校验
      - App__SelfUrl=http://localhost:8090
      # 允许跨域的前端地址，多个地址用逗号分隔，比如http://localhost:8091,https://your-domain.com
      - App__CorsOrigins=http://localhost:8091
      # OpenIddict认证服务地址，和后端地址一致
      - AuthServer__Authority=http://localhost:8090
      # 开发/测试环境关闭HTTPS元数据校验，生产环境如果用HTTPS需要改成true
      - AuthServer__RequireHttpsMetadata=false
      # 字符串加密默认密钥，建议生产环境自定义，支持从.env文件读取STRING_ENCRYPT_PASSPHRASE变量
      - StringEncryption__DefaultPassPhrase=${STRING_ENCRYPT_PASSPHRASE:-xLUxRRN16IANIM4W}
      # 设置时区为北京时间，解决日志时间差8小时问题
      - TZ=Asia/Shanghai
    depends_on:
      - sqlserver  # 先启动数据库再启动后端
    restart: unless-stopped  # 容器重启策略：异常退出自动重启，手动停止则不重启
    volumes:
      # 挂载宿主机时区文件，让容器时间和宿主机完全同步（Linux下生效，Windows下可注释）
      - /etc/localtime:/etc/localtime:ro

  # 前端Web服务（Vue 3 + Nginx）
  frontend:
    build:
      context: ./vue  # 构建上下文目录：前端源码根目录
      dockerfile: Dockerfile  # 前端Docker镜像构建文件路径
    container_name: dbfm-frontend  # 容器名称
    ports:
      - "8091:80"  # 端口映射：宿主机8091端口 → 容器内80端口（Nginx监听端口）
    depends_on:
      - backend  # 依赖关系：先启动backend服务，再启动前端服务
    restart: unless-stopped  # 容器重启策略，同后端
    environment:
      - TZ=Asia/Shanghai  # 设置时区为北京时间
    volumes:
      # 同步宿主机时区
      - /etc/localtime:/etc/localtime:ro

# 全局命名卷声明：数据持久化专用，docker自动管理存储位置
volumes:
  sqlserver_data:
