version: '3.8'  # Docker Compose配置文件版本，兼容Docker 20.10+

services:
  # 后端API服务（.NET 10 + ABP框架）
  backend:
    build:
      context: ./aspnet-core  # 构建上下文目录：后端源码根目录
      dockerfile: Dockerfile  # 后端Docker镜像构建文件路径
    container_name: dbfm-backend  # 容器名称，方便运维管理
    ports:
      - "8090:8090"  # 端口映射：宿主机8090端口 → 容器内8090端口（后端服务监听端口）
    environment:
      # .NET运行环境：Production生产环境 / Development开发环境
      - ASPNETCORE_ENVIRONMENT=Production
      # 数据库连接字符串：SQL Server地址、数据库名、账号密码，支持从.env文件读取DB_CONNECTION变量
      - ConnectionStrings__Default=${DB_CONNECTION:-Server=host.docker.internal,1433;Database=DbFieldManager;User Id=sa;Password=Aa.123123;TrustServerCertificate=true}
      # 后端服务自身访问地址，用于生成链接和跨域校验
      - App__SelfUrl=http://localhost:8090
      # 允许跨域的前端地址，多个地址用逗号分隔，比如http://localhost:8091,https://your-domain.com
      - App__CorsOrigins=http://localhost:8091
      # OpenIddict认证服务地址，和后端地址一致
      - AuthServer__Authority=http://localhost:8090
      # 开发/测试环境关闭HTTPS元数据校验，生产环境如果用HTTPS需要改成true
      - AuthServer__RequireHttpsMetadata=false
      # 字符串加密默认密钥，建议生产环境自定义，支持从.env文件读取STRING_ENCRYPT_PASSPHRASE变量
      - StringEncryption__DefaultPassPhrase=${STRING_ENCRYPT_PASSPHRASE:-xLUxRRN16IANIM4W}
    restart: unless-stopped  # 容器重启策略：异常退出自动重启，手动停止则不重启
    extra_hosts:
      # 【仅Linux系统需要】容器内部域名解析：host.docker.internal → 宿主机IP，让容器可以访问宿主机上的服务（比如SQL Server）
      # Windows/Mac版Docker Desktop默认支持该解析，不需要可以注释掉
      - "host.docker.internal:host-gateway"

  # 前端Web服务（Vue 3 + Nginx）
  frontend:
    build:
      context: ./vue  # 构建上下文目录：前端源码根目录
      dockerfile: Dockerfile  # 前端Docker镜像构建文件路径
    container_name: dbfm-frontend  # 容器名称
    ports:
      - "8091:80"  # 端口映射：宿主机8091端口 → 容器内80端口（Nginx监听端口）
    depends_on:
      - backend  # 依赖关系：先启动backend服务，再启动前端服务
    restart: unless-stopped  # 容器重启策略，同后端
